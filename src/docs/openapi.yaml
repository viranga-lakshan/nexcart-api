openapi: 3.0.3
info:
  title: NexCart API
  version: 1.0.0
  description: Modular e-commerce backend API built with Express, Prisma, PostgreSQL, JWT, and Zod.
servers:
  - url: http://localhost:5000/api/v1
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Categories
  - name: Products
  - name: Cart
  - name: Orders
  - name: Admin
paths:
  /health:
    get:
      tags: [Health]
      summary: Check API health
      responses:
        '200':
          description: API is healthy
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a user or seller
      responses:
        '201':
          description: Registration successful
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      responses:
        '200':
          description: Login successful
  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue a new access token
      responses:
        '200':
          description: Access token refreshed successfully
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token
      responses:
        '200':
          description: Logout successful
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all refresh tokens for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out from all devices successfully
  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Generate a password reset token
      responses:
        '200':
          description: Reset token generated if the account exists
  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      responses:
        '200':
          description: Password reset successful
  /users/me:
    get:
      tags: [Users]
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched successfully
    patch:
      tags: [Users]
      summary: Update authenticated user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile updated successfully
  /users/me/addresses:
    get:
      tags: [Users]
      summary: List authenticated user's addresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Addresses fetched successfully
    post:
      tags: [Users]
      summary: Create an address for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Address created successfully
  /users/me/addresses/{addressId}:
    patch:
      tags: [Users]
      summary: Update one of the authenticated user's addresses
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: addressId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Address updated successfully
    delete:
      tags: [Users]
      summary: Delete one of the authenticated user's addresses
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: addressId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Address deleted successfully
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      responses:
        '200':
          description: Categories fetched successfully
    post:
      tags: [Categories]
      summary: Create category
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Category created successfully
  /categories/{categoryId}:
    get:
      tags: [Categories]
      summary: Get category by id
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Category fetched successfully
    patch:
      tags: [Categories]
      summary: Update category
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Category updated successfully
    delete:
      tags: [Categories]
      summary: Delete category
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Category deleted successfully
  /products:
    get:
      tags: [Products]
      summary: List active products with pagination, filtering, sorting, and search
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: string
            format: uuid
        - in: query
          name: minPrice
          schema:
            type: number
        - in: query
          name: maxPrice
          schema:
            type: number
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [name, price, createdAt]
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Products fetched successfully
    post:
      tags: [Products]
      summary: Create product as seller or admin
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Product created successfully
  /products/me/listings:
    get:
      tags: [Products]
      summary: List authenticated seller's products, including inactive listings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Seller products fetched successfully
  /products/{productId}:
    get:
      tags: [Products]
      summary: Get active product by id
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Product fetched successfully
    patch:
      tags: [Products]
      summary: Update product as owner seller or admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product updated successfully
    delete:
      tags: [Products]
      summary: Soft delete product as owner seller or admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product deleted successfully
  /cart:
    get:
      tags: [Cart]
      summary: Get authenticated user's cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart fetched successfully
    delete:
      tags: [Cart]
      summary: Clear authenticated user's cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared successfully
  /cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Item added to cart successfully
  /cart/items/{productId}:
    patch:
      tags: [Cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cart item updated successfully
    delete:
      tags: [Cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cart item removed successfully
  /orders:
    get:
      tags: [Orders]
      summary: List authenticated user's order history
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, PAID, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
      responses:
        '200':
          description: Orders fetched successfully
    post:
      tags: [Orders]
      summary: Place an order from the authenticated user's cart
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Order placed successfully
  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get authenticated user's order details and status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order fetched successfully
  /admin/users:
    get:
      tags: [Admin]
      summary: Admin list users with pagination, role filter, and search
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users fetched successfully
  /admin/users/{userId}:
    get:
      tags: [Admin]
      summary: Admin get user details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User fetched successfully
  /admin/users/{userId}/role:
    patch:
      tags: [Admin]
      summary: Admin update user role
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User role updated successfully
  /admin/products:
    get:
      tags: [Admin]
      summary: Admin list products including inactive listings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Products fetched successfully
  /admin/products/{productId}:
    get:
      tags: [Admin]
      summary: Admin get product details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product fetched successfully
    patch:
      tags: [Admin]
      summary: Admin moderate product active status, stock, or price
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Product updated successfully
  /admin/orders:
    get:
      tags: [Admin]
      summary: Admin list orders with status and user filters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders fetched successfully
  /admin/orders/{orderId}:
    get:
      tags: [Admin]
      summary: Admin get order details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order fetched successfully
  /admin/orders/{orderId}/status:
    patch:
      tags: [Admin]
      summary: Admin update order status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Order status updated successfully
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

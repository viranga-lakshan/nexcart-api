name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      JWT_ACCESS_SECRET: ci_access_secret_must_be_at_least_32_chars
      JWT_REFRESH_SECRET: ci_refresh_secret_must_be_at_least_32_chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run ESLint
        run: npm run lint

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd "${{ secrets.EC2_APP_DIR }}"
            git fetch origin main
            git reset --hard origin/main

            run_compose() {
              if docker compose version >/dev/null 2>&1; then
                sudo docker compose "$@"
              elif command -v docker-compose >/dev/null 2>&1; then
                sudo docker-compose "$@"
              else
                echo "ERROR: Docker Compose not installed. Run on EC2:"
                echo "  sudo apt update && sudo apt install -y docker-compose-v2"
                exit 1
              fi
            }

            run_compose -f docker-compose.prod.yml up -d --build
            sudo docker image prune -f
            echo "Deploy finished. Health check:"
            curl -fsS http://localhost:5000/api/v1/health || true
